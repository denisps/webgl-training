<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Map Location Example</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; }
      header, main { padding: 1rem 1.25rem; }
      header { border-bottom: 1px solid #1e293b; }
      main { display: grid; grid-template-columns: minmax(320px, 1.2fr) minmax(280px, 1fr); gap: 1rem; }
      section { background: #111827; border: 1px solid #1f2937; border-radius: 0.75rem; padding: 1rem; }
      .controls { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; margin-bottom: 1rem; }
      button, input { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; border-radius: 0.5rem; padding: 0.5rem 0.75rem; }
      button { cursor: pointer; }
      input[type="number"] { width: 3.5rem; }
      canvas { max-width: 100%; border-radius: 0.5rem; background: #020617; }
      .status { color: #94a3b8; font-size: 0.95rem; }
      .prediction { font-size: 1rem; line-height: 1.6; }
      label { display: inline-flex; gap: 0.5rem; align-items: center; }
    </style>
  </head>
  <body>
    <header>
      <h1>Map Location Prediction</h1>
      <p>Train a dense WebGL model to predict the clicked region from an RGB patch.</p>
      <p><a href="/">Back</a></p>
    </header>
    <main>
      <section>
        <div class="controls">
          <button id="trainBtn">Train</button>
          <button id="stopBtn">Stop</button>
          <button id="resetBtn">Reset</button>
          <button id="loadImageBtn">Load map image</button>
          <button id="downloadBtn">Download weights</button>
          <button id="uploadBtn">Upload weights</button>
          <label>Regions <input id="regionsInput" type="number" min="2" max="512" value="8" /></label>
          <label>LR <input id="lrInput" type="range" min="0.0005" max="0.02" step="0.0005" value="0.004" /></label>
          <label>Epochs <input id="epochsInput" type="number" min="1" max="200" value="20" /></label>
        </div>
        <canvas id="mapCanvas" width="512" height="512"></canvas>
        <p class="status" id="status"></p>
      </section>
      <section>
        <h2>Training</h2>
        <canvas id="lossCanvas" width="360" height="180"></canvas>
        <p class="status" id="epochLabel">Epoch: 0</p>
        <h2>Testing</h2>
        <canvas id="patchCanvas" width="256" height="256"></canvas>
        <div class="prediction" id="predictionLabel">Click the map to test a patch.</div>
      </section>
    </main>
    <script type="module">
      import { createWebGL2Context } from '../../src/webgl/context.js';
      import { buildProgramCache } from '../../src/webgl/program.js';
      import { MATMUL_SHADERS } from '../../src/ops/matmul.js';
      import { ELEMENTWISE_SHADERS } from '../../src/ops/elementwise.js';
      import { REDUCE_SHADERS } from '../../src/ops/reduce.js';
      import { NORM_SHADERS } from '../../src/ops/norm.js';
      import { ATTENTION_SHADERS } from '../../src/ops/attention.js';
      import { PATCH_SHADERS } from '../../src/ops/patch.js';
      import { LOSS_SHADERS } from '../../src/training/loss.js';
      import { OPTIMIZER_SHADERS } from '../../src/training/optimizer.js';
      import { TRANSFORMER_SHADERS } from '../../src/layers/transformer.js';
      import { createTrainer, trainStep } from '../../src/training/trainer.js';
      import { createDataset, shuffleDataset, getBatch } from '../../src/utils/data.js';
      import { downloadModel, loadWeightsFromFile } from '../../src/utils/serialize.js';
      import { loadModelWeights } from '../../src/inference/model.js';
      import { runBatchInference } from '../../src/inference/runner.js';
      import { generateMap, generateTrainingPatches, extractPatch, assignRegionsByGrid, generateGridTrainingPatches } from './mapgen.js';
      import { createMapModel, REGION_SIZE } from './model.js';

      const shaderSources = {
        ...MATMUL_SHADERS,
        ...ELEMENTWISE_SHADERS,
        ...REDUCE_SHADERS,
        ...NORM_SHADERS,
        ...ATTENTION_SHADERS,
        ...PATCH_SHADERS,
        ...TRANSFORMER_SHADERS,
        ...LOSS_SHADERS,
        ...OPTIMIZER_SHADERS,
      };

      const mapCanvas = document.getElementById('mapCanvas');
      const patchCanvas = document.getElementById('patchCanvas');
      const lossCanvas = document.getElementById('lossCanvas');
      const statusLabel = document.getElementById('status');
      const epochLabel = document.getElementById('epochLabel');
      const predictionLabel = document.getElementById('predictionLabel');
      const lrInput = document.getElementById('lrInput');
      const epochsInput = document.getElementById('epochsInput');
      const regionsInput = document.getElementById('regionsInput');

      const gl = createWebGL2Context(document.createElement('canvas'));
      const programs = buildProgramCache(gl, shaderSources);
      const MAX_PREVIEW_PX = 512;
      const DEFAULT_MAP_SIZE = 256;
      let mapWidth = DEFAULT_MAP_SIZE;
      let mapHeight = DEFAULT_MAP_SIZE;
      let mapState;
      let dataset;
      let model;
      let trainer;
      let lossHistory = [];
      let stopRequested = false;
      // null = procedural map; set to { bitmap, width, height, imageData } when a file is loaded
      let mapSource = null;

      // Scale patchesPerRegion with the square root of image area so larger
      // maps get proportionally more training samples, capped for performance.
      function computePatchesPerRegion() {
        return Math.max(24, Math.min(200, Math.round(Math.sqrt(mapWidth * mapHeight) / 6)));
      }

      // Resize the map canvas to fit within MAX_PREVIEW_PX while preserving
      // the image aspect ratio.
      function resizeMapCanvas() {
        const scale = MAX_PREVIEW_PX / Math.max(mapWidth, mapHeight);
        mapCanvas.width = Math.round(mapWidth * scale);
        mapCanvas.height = Math.round(mapHeight * scale);
      }

      // Draw semi-transparent grid lines that show the region boundaries.
      function drawRegionGuidelines() {
        const { gridCols, gridRows } = mapState;
        if (!gridCols || !gridRows) return;
        const ctx = mapCanvas.getContext('2d');
        ctx.save();
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let col = 1; col < gridCols; col += 1) {
          const x = Math.round(col * mapCanvas.width / gridCols) + 0.5;
          ctx.moveTo(x, 0);
          ctx.lineTo(x, mapCanvas.height);
        }
        for (let row = 1; row < gridRows; row += 1) {
          const y = Math.round(row * mapCanvas.height / gridRows) + 0.5;
          ctx.moveTo(0, y);
          ctx.lineTo(mapCanvas.width, y);
        }
        ctx.stroke();
        ctx.restore();
      }

      // Draw a subtle per-pixel grid on the patch canvas to show individual
      // patch pixels when the patch is scaled up.
      function drawPatchPixelGrid() {
        const ctx = patchCanvas.getContext('2d');
        const cellW = patchCanvas.width / REGION_SIZE;
        const cellH = patchCanvas.height / REGION_SIZE;
        ctx.save();
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        for (let col = 1; col < REGION_SIZE; col += 1) {
          const x = col * cellW + 0.5;
          ctx.moveTo(x, 0);
          ctx.lineTo(x, patchCanvas.height);
        }
        for (let row = 1; row < REGION_SIZE; row += 1) {
          const y = row * cellH + 0.5;
          ctx.moveTo(0, y);
          ctx.lineTo(patchCanvas.width, y);
        }
        ctx.stroke();
        ctx.restore();
      }

      function drawLoss() {
        const ctx = lossCanvas.getContext('2d');
        ctx.clearRect(0, 0, lossCanvas.width, lossCanvas.height);
        ctx.fillStyle = '#020617';
        ctx.fillRect(0, 0, lossCanvas.width, lossCanvas.height);
        if (lossHistory.length < 2) return;
        const maxLoss = Math.max(...lossHistory);
        const minLoss = Math.min(...lossHistory);
        ctx.strokeStyle = '#38bdf8';
        ctx.lineWidth = 2;
        ctx.beginPath();
        lossHistory.forEach((loss, index) => {
          const x = (index / Math.max(lossHistory.length - 1, 1)) * lossCanvas.width;
          const y = lossCanvas.height - ((loss - minLoss) / Math.max(maxLoss - minLoss, 1e-6)) * (lossCanvas.height - 12) - 6;
          if (index === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
      }

      function renderMap() {
        const ctx = mapCanvas.getContext('2d');
        if (mapState.bitmap) {
          ctx.clearRect(0, 0, mapCanvas.width, mapCanvas.height);
          ctx.drawImage(mapState.bitmap, 0, 0, mapCanvas.width, mapCanvas.height);
        } else {
          const temp = document.createElement('canvas');
          temp.width = mapWidth;
          temp.height = mapHeight;
          temp.getContext('2d').putImageData(new ImageData(mapState.imageData, mapWidth, mapHeight), 0, 0);
          ctx.clearRect(0, 0, mapCanvas.width, mapCanvas.height);
          ctx.drawImage(temp, 0, 0, mapCanvas.width, mapCanvas.height);
        }
        drawRegionGuidelines();
      }

      function renderPatch(patch) {
        const image = new ImageData(REGION_SIZE, REGION_SIZE);
        for (let i = 0; i < REGION_SIZE * REGION_SIZE; i += 1) {
          image.data[i * 4 + 0] = Math.max(0, Math.min(255, (patch[i * 3 + 0] + 1) * 127.5));
          image.data[i * 4 + 1] = Math.max(0, Math.min(255, (patch[i * 3 + 1] + 1) * 127.5));
          image.data[i * 4 + 2] = Math.max(0, Math.min(255, (patch[i * 3 + 2] + 1) * 127.5));
          image.data[i * 4 + 3] = 255;
        }
        const temp = document.createElement('canvas');
        temp.width = REGION_SIZE;
        temp.height = REGION_SIZE;
        temp.getContext('2d').putImageData(image, 0, 0);
        const ctx = patchCanvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        ctx.clearRect(0, 0, patchCanvas.width, patchCanvas.height);
        ctx.drawImage(temp, 0, 0, patchCanvas.width, patchCanvas.height);
        drawPatchPixelGrid();
      }

      // Extract raw RGBA pixels from an arbitrary-sized image file using 2048-px
      // canvas tiles so no single canvas allocation exceeds the texture size limit.
      async function loadImageFromFile(file) {
        const bitmap = await createImageBitmap(file);
        const { width, height } = bitmap;
        const imageData = new Uint8ClampedArray(width * height * 4);
        const tileSize = 2048;
        for (let ty = 0; ty < height; ty += tileSize) {
          const tileH = Math.min(tileSize, height - ty);
          for (let tx = 0; tx < width; tx += tileSize) {
            const tileW = Math.min(tileSize, width - tx);
            const tile = document.createElement('canvas');
            tile.width = tileW;
            tile.height = tileH;
            const tileCtx = tile.getContext('2d');
            tileCtx.drawImage(bitmap, -tx, -ty);
            const tilePixels = tileCtx.getImageData(0, 0, tileW, tileH).data;
            for (let row = 0; row < tileH; row += 1) {
              const src = row * tileW * 4;
              const dst = ((ty + row) * width + tx) * 4;
              imageData.set(tilePixels.subarray(src, src + tileW * 4), dst);
            }
          }
        }
        return { bitmap, width, height, imageData };
      }

      function resetModel(nRegions) {
        model = createMapModel(gl, nRegions);
        trainer = createTrainer(gl, programs, model, {
          lr: Number(lrInput.value),
          beta1: 0.9,
          beta2: 0.999,
          eps: 1e-8,
          batchSize: 256,
          loss: 'crossEntropy',
        });
      }

      // Recompute region assignment and training dataset from the current map
      // source (image file or procedural). Called whenever the image, the region
      // count, or the loaded model changes.
      function rebuildRegions(nRegions) {
        regionsInput.value = nRegions;
        if (mapSource) {
          mapWidth = mapSource.width;
          mapHeight = mapSource.height;
          const { regionMask, gridCols, gridRows } = assignRegionsByGrid(mapWidth, mapHeight, nRegions);
          mapState = { imageData: mapSource.imageData, bitmap: mapSource.bitmap, regionMask, gridCols, gridRows };
          const samples = computePatchesPerRegion();
          dataset = createDataset(...Object.values(
            generateGridTrainingPatches(mapSource.imageData, mapWidth, mapHeight, gridCols, gridRows, REGION_SIZE, samples)
          ));
          statusLabel.textContent = `Image: ${mapWidth}\u00d7${mapHeight}px (${gridCols}\u00d7${gridRows} regions) | ${dataset.size} samples.`;
        } else {
          mapWidth = DEFAULT_MAP_SIZE;
          mapHeight = DEFAULT_MAP_SIZE;
          mapState = generateMap(mapWidth, mapHeight, nRegions);
          const samples = computePatchesPerRegion();
          dataset = createDataset(...Object.values(
            generateTrainingPatches(mapState.imageData, mapState.regionMask, mapWidth, mapHeight, REGION_SIZE, samples)
          ));
          statusLabel.textContent = `Dataset: ${dataset.size} samples across ${nRegions} regions.`;
        }
        resizeMapCanvas();
        renderMap();
        drawLoss();
      }

      function initFromGeneratedMap() {
        mapSource = null;
        const nRegions = Number(regionsInput.value);
        lossHistory = [];
        rebuildRegions(nRegions);
        resetModel(nRegions);
        epochLabel.textContent = 'Epoch: 0';
        predictionLabel.textContent = 'Click the map to test a patch.';
      }

      async function initFromImageFile(file) {
        const { bitmap, width, height, imageData } = await loadImageFromFile(file);
        mapSource = { bitmap, width, height, imageData };
        const nRegions = Number(regionsInput.value);
        lossHistory = [];
        rebuildRegions(nRegions);
        resetModel(nRegions);
        epochLabel.textContent = 'Epoch: 0';
        predictionLabel.textContent = 'Click the map to test a patch.';
      }

      async function train() {
        stopRequested = false;
        trainer.config.lr = Number(lrInput.value);
        const epochs = Number(epochsInput.value);
        const yieldEveryMs = 100;
        for (let epoch = 0; epoch < epochs; epoch += 1) {
          if (stopRequested) break;
          const shuffled = shuffleDataset(dataset);
          const { batchSize } = trainer.config;
          const batchCount = Math.ceil(shuffled.inputs.length / batchSize);
          let totalLoss = 0;
          let lastYield = performance.now();
          let lastBatchLoss = 0;
          for (let batchIndex = 0; batchIndex < batchCount; batchIndex += 1) {
            if (stopRequested) break;
            const batch = getBatch(shuffled, batchIndex, batchSize);
            const { loss } = trainStep(gl, programs, trainer, batch.inputs, batch.labels);
            totalLoss += loss;
            lastBatchLoss = loss;
            const now = performance.now();
            if (now - lastYield >= yieldEveryMs) {
              statusLabel.textContent = `Epoch ${epoch + 1}/${epochs} batch ${batchIndex + 1}/${batchCount} loss ${lastBatchLoss.toFixed(4)}`;
              await new Promise((resolve) => setTimeout(resolve, 0));
              lastYield = performance.now();
            }
          }
          if (stopRequested) break;
          const avgLoss = totalLoss / Math.max(batchCount, 1);
          lossHistory.push(avgLoss);
          epochLabel.textContent = `Epoch: ${epoch + 1}`;
          statusLabel.textContent = `Epoch ${epoch + 1}/${epochs} avg loss ${avgLoss.toFixed(4)}`;
          drawLoss();
          await new Promise((resolve) => requestAnimationFrame(resolve));
        }
      }

      function regionColor(regionIndex, nRegions) {
        return `hsl(${Math.round((regionIndex / nRegions) * 360)}, 65%, 55%)`;
      }

      // Tint every pixel belonging to the predicted and truth regions on the map
      // canvas so the user can see where each region is located.
      // Predicted (wrong): blue; ground truth (when wrong): green; correct: gold.
      function drawRegionHighlight(predictedIndex, truthIndex) {
        const nPixels = mapWidth * mapHeight;
        const overlay = document.createElement('canvas');
        overlay.width = mapWidth;
        overlay.height = mapHeight;
        const octx = overlay.getContext('2d');
        const imgData = octx.createImageData(mapWidth, mapHeight);
        const same = predictedIndex === truthIndex;
        for (let i = 0; i < nPixels; i += 1) {
          const region = mapState.regionMask[i];
          let r = 0; let g = 0; let b = 0; let a = 0;
          if (same && region === truthIndex) {
            r = 234; g = 179; b = 8; a = 150;        // gold — correct
          } else if (!same && region === predictedIndex) {
            r = 59; g = 130; b = 246; a = 150;        // blue — wrong prediction
          } else if (!same && region === truthIndex) {
            r = 34; g = 197; b = 94; a = 150;         // green — ground truth
          }
          if (a > 0) {
            imgData.data[i * 4 + 0] = r;
            imgData.data[i * 4 + 1] = g;
            imgData.data[i * 4 + 2] = b;
            imgData.data[i * 4 + 3] = a;
          }
        }
        octx.putImageData(imgData, 0, 0);
        mapCanvas.getContext('2d').drawImage(overlay, 0, 0, mapCanvas.width, mapCanvas.height);
      }

      async function predictAt(x, y) {
        const patch = extractPatch(mapState.imageData, mapWidth, x, y, REGION_SIZE);
        renderPatch(patch);
        const logits = runBatchInference(gl, programs, model, patch);
        let bestIndex = 0;
        let bestValue = logits[0];
        for (let index = 1; index < logits.length; index += 1) {
          if (logits[index] > bestValue) {
            bestValue = logits[index];
            bestIndex = index;
          }
        }
        const truth = mapState.regionMask[y * mapWidth + x];
        const nRegions = model.architecture.nRegions;
        const swatch = (color) => `<span style="display:inline-block;width:13px;height:13px;border-radius:3px;vertical-align:middle;margin:0 5px 1px 0;background:${color}"></span>`;
        const match = bestIndex === truth ? '&#10003; correct' : '&#10007; wrong';
        predictionLabel.innerHTML =
          `${swatch(regionColor(bestIndex, nRegions))}Predicted: region ${bestIndex}&nbsp;&nbsp;&nbsp;` +
          `${swatch(regionColor(truth, nRegions))}Ground truth: region ${truth}&nbsp;&nbsp;${match}`;
        renderMap();
        drawRegionHighlight(bestIndex, truth);
      }

      mapCanvas.addEventListener('click', (event) => {
        const rect = mapCanvas.getBoundingClientRect();
        const x = Math.max(0, Math.min(mapWidth - 1, Math.floor((event.clientX - rect.left) * mapWidth / rect.width)));
        const y = Math.max(0, Math.min(mapHeight - 1, Math.floor((event.clientY - rect.top) * mapHeight / rect.height)));
        predictAt(x, y);
      });

      document.getElementById('loadImageBtn').addEventListener('click', () => {
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = 'image/*';
        fileInput.addEventListener('change', async (event) => {
          const file = event.target.files[0];
          if (!file) return;
          try {
            await initFromImageFile(file);
          } catch (error) {
            statusLabel.textContent = `Error loading image: ${error.message}`;
          }
        });
        fileInput.click();
      });

      document.getElementById('trainBtn').addEventListener('click', train);
      document.getElementById('stopBtn').addEventListener('click', () => { stopRequested = true; });
      document.getElementById('resetBtn').addEventListener('click', initFromGeneratedMap);
      document.getElementById('downloadBtn').addEventListener('click', () => {
        downloadModel(gl, { architecture: model.architecture }, model.parameters, 'map-location-model.json');
      });
      document.getElementById('uploadBtn').addEventListener('click', async () => {
        const parsed = await loadWeightsFromFile();
        if (!parsed) return;
        try {
          if (parsed.architecture) {
            rebuildRegions(parsed.architecture.nRegions);
            resetModel(parsed.architecture.nRegions);
          }
          loadModelWeights(gl, model, parsed);
          const arch = parsed.architecture;
          let message = `Weights loaded (${model.architecture.nRegions} regions).`;
          if (arch?.regionSize && arch.regionSize !== REGION_SIZE) {
            message += ` Note: file was trained with regionSize=${arch.regionSize}, current build uses ${REGION_SIZE}.`;
          }
          statusLabel.textContent = message;
        } catch (error) {
          statusLabel.textContent = `Error loading weights: ${error.message}`;
        }
      });

      regionsInput.addEventListener('change', () => {
        const nRegions = Number(regionsInput.value);
        lossHistory = [];
        rebuildRegions(nRegions);
        resetModel(nRegions);
        epochLabel.textContent = 'Epoch: 0';
        predictionLabel.textContent = 'Click the map to test a patch.';
      });

      initFromGeneratedMap();
      renderPatch(extractPatch(mapState.imageData, mapWidth, mapWidth / 2, mapHeight / 2, REGION_SIZE));
    </script>
  </body>
</html>
